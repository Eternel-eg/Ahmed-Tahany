<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Tahany & Ahmed — Wedding Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet" />
  
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       WEDDING INVITATION — Tahany & Ahmed
       Style: Light & Dreamy · Cinematic Luxury (Tailored for Pastel Backgrounds)
       ═══════════════════════════════════════════════════════════════════════ */

    :root {
      /* 🎨 GLOBAL COLOR PALETTE (Adjusted for Pastel Contrasts) */
      --text-main:     #6E1A37;    /* Deep burgundy for names */
      --text-accent:   #6E1A37;    /* Matching burgundy for smaller text */
      --gold-dark:     #b38b4d;    /* Deeper gold for ornaments so they pop */
      --halo-light:    rgba(255, 255, 255, 0.85); /* White glow to separate text from background */

      /* ── Fonts ── */
      --font-serif:    'Cormorant Garamond', Georgia, serif;
      --font-sc:       'Cormorant SC', 'Cormorant Garamond', serif;
      --font-script:   'Great Vibes', cursive;

      /* ── Easing ── */
      --ease-silk: cubic-bezier(0.25, 0.1, 0.1, 1);
      --ease-out:  cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fdfbf7; /* Lightened base background */
      font-family: var(--font-serif);
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       SCENE SYSTEM
       ═══════════════════════════════════════════════════════════════════════ */
    .scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1.4s var(--ease-silk);
      z-index: 10;
    }

    .scene.active { opacity: 1;   pointer-events: all;  }
    .scene.hidden { opacity: 0;   pointer-events: none; }
    .scene.gone   { display: none; }

    /* ═══════════════════════════════════════════════════════════════════════
       SCREEN 1 — PRELOADER (Lightened for Pastel Theme)
       ═══════════════════════════════════════════════════════════════════════ */
    #loader { flex-direction: column; z-index: 100; background: transparent; }

    .loader-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 30% 20%, rgba(200,170,120,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 75% 85%, rgba(210,170,130,0.1) 0%, transparent 55%),
        linear-gradient(160deg, #fdfbf7 0%, #f4eee6 40%, #fdfbf7 70%, #ece5db 100%);
      animation: loaderBgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes loaderBgPulse { 0% { filter: brightness(1); } 100% { filter: brightness(1.05); } }

    .loader-particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }

    .loader-particles .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-dark) 0%, transparent 70%);
      opacity: 0;
      animation: floatUp var(--dur, 6s) var(--delay, 0s) ease-in-out infinite;
    }

    @keyframes floatUp {
      0%   { opacity: 0;   transform: translateY(0) scale(0.6);    }
      20%  { opacity: 0.4; }
      80%  { opacity: 0.2; }
      100% { opacity: 0;   transform: translateY(-120px) scale(1); }
    }

    .loader-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(24px, 5vw, 40px);
    }

    .logo-wrap {
      position: relative;
      width: clamp(160px, 35vw, 280px);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-glow {
      position: absolute;
      inset: -30%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 65%);
      animation: glowPulse 3s ease-in-out infinite alternate;
    }

    @keyframes glowPulse { 0% { transform: scale(0.9); opacity: 0.7; } 100% { transform: scale(1.15); opacity: 1; } }

    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: logoFloat 4s ease-in-out infinite alternate, logoFadeIn 1.6s var(--ease-out) forwards;
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.8));
    }

    @keyframes logoFloat  { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
    @keyframes logoFadeIn { from { opacity: 0; transform: scale(0.85) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    .loader-subtitle {
      font-family: var(--font-sc);
      font-size: clamp(11px, 1.8vw, 14px);
      letter-spacing: 0.35em;
      color: var(--text-accent);
      text-transform: uppercase;
      animation: subtitleFade 2s 0.8s ease-out forwards;
      opacity: 0;
    }

    @keyframes subtitleFade { to { opacity: 1; } }

    .loader-bar-wrap {
      width: clamp(100px, 28vw, 180px);
      height: 1px;
      background: rgba(179,139,77,0.2);
      border-radius: 1px;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #d8bc8a, var(--gold-dark), #d8bc8a);
      background-size: 200% 100%;
      border-radius: 1px;
      transition: width 0.4s ease;
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }

    /* ═══════════════════════════════════════════════════════════════════════
       TAP-TO-ENTER OVERLAY
       ═══════════════════════════════════════════════════════════════════════ */
    .tap-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(253, 251, 247, 0.88); /* Lighter overlay */
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: opacity 0.8s ease;
    }

    .tap-overlay.hidden { display: none; }

    .tap-inner { display: flex; flex-direction: column; align-items: center; gap: 24px; animation: tapPulse 2.4s ease-in-out infinite; }
    @keyframes tapPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

    .tap-logo  { width: clamp(100px, 22vw, 160px); filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)); }
    .tap-label { font-family: var(--font-sc); font-size: clamp(12px, 2vw, 16px); letter-spacing: 0.4em; color: var(--text-accent); text-transform: uppercase; }

    .tap-ring {
      position: absolute;
      width: clamp(180px, 38vw, 280px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(179,139,77,0.4);
      animation: ringExpand 2.4s ease-out infinite;
    }

    @keyframes ringExpand { 0% { transform: scale(0.85); opacity: 0.8; } 100% { transform: scale(1.25); opacity: 0; } }

    /* ═══════════════════════════════════════════════════════════════════════
       SCREEN 2 — INTRO / BRIDGE (image2)
       ═══════════════════════════════════════════════════════════════════════ */
    #intro { z-index: 50; overflow: hidden; background: #fdfbf7; }

    .intro-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      animation: cinematicZoom 5s var(--ease-silk) forwards;
    }

    @keyframes cinematicZoom { 0% { transform: scale(1.08); } 100% { transform: scale(1); } }

    /* Changed dark vignettes to light/soft overlays for pastel theme */
    .intro-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.0) 40%, rgba(255,255,255,0.0) 65%, rgba(255,255,255,0.4) 100%);
    }

    .intro-vignette { position: absolute; inset: 0; z-index: 2; box-shadow: inset 0 0 120px rgba(255,255,255,0.4); pointer-events: none; }

    /* ═══════════════════════════════════════════════════════════════════════
       SCREEN 3 — MAIN INVITATION
       ═══════════════════════════════════════════════════════════════════════ */
    #main { z-index: 20; overflow: hidden; background: #fdfbf7; }

    .main-bg-wrap { position: absolute; inset: 0; z-index: 0; }
    .main-bg-gif { width: 100%; height: 100%; object-fit: cover; object-position: center; }

    /* Overlays disabled by default */
    .main-overlay-gradient { display: none; }
    .main-overlay-vignette { display: none; }

    #particleCanvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      width: 100%;
      height: 100%;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       📐  TEXT BLOCK POSITION
       ═══════════════════════════════════════════════════════════════════════ */
    .invitation-wrap {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 0px;
      gap: clamp(8px, 2vh, 18px);
      padding: clamp(20px, 4vw, 50px) clamp(16px, 6vw, 60px);
      text-align: center;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }

    .anim-item {
      opacity: 0;
      transform: translateY(26px);
      transition: opacity 1.2s var(--ease-out), transform 1.2s var(--ease-out);
    }
    .anim-item.revealed { opacity: 1; transform: translateY(0); }

    /* ═══════════════════════════════════════════════════════════════════════
       ✦  DECORATIVE RULES
       ═══════════════════════════════════════════════════════════════════════ */
    .deco-rule { display: flex; align-items: center; gap: 14px; width: clamp(160px, 44vw, 320px); }
    .deco-rule--sm { width: clamp(90px, 24vw, 180px); }

    .rule-line {
      flex: 1;
      height: 1px;
      /* Darker gold gradient for contrast on pastel */
      background: linear-gradient(90deg, transparent, rgba(179, 139, 77, 0.6), transparent);
    }

    .rule-diamond {
      font-size: clamp(10px, 1.8vw, 14px);
      color: var(--gold-dark);
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.9)); /* White halo behind diamond */
    }

    /* ═══════════════════════════════════════════════════════════════════════
       📝  LINE 1 — "Together with their families"
       ═══════════════════════════════════════════════════════════════════════ */
    .together {
      font-family: var(--font-serif);
      font-weight: 400; /* slightly heavier for contrast */
      font-style: italic;
      font-size: clamp(16px, 3vw, 26px);
      letter-spacing: 0.14em;
      
      /* Dark elegant text color */
      color: var(--text-accent);
      
      /* Soft white halo to pop off pastel images */
      text-shadow: 0 0 12px var(--halo-light), 0 0 20px rgba(255,255,255,0.5);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       👰  BRIDE NAME — "Tahany"
       ═══════════════════════════════════════════════════════════════════════ */
    .name-script {
      font-family: var(--font-script);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.02em;
      font-size: clamp(80px, 18vw, 148px);

      /* Deep Charcoal for maximum contrast on pastels */
      color: var(--text-main);

      /* Elegant white soft-glow outline to separate from background */
      text-shadow:
        0 0 15px var(--halo-light),
        0 0 30px var(--halo-light),
        0 0 45px rgba(255, 255, 255, 0.6);
        
      filter: drop-shadow(0 2px 4px rgba(255,255,255,0.5));
    }

    /* ═══════════════════════════════════════════════════════════════════════
       🤵  GROOM NAME — "Ahmed"
       ═══════════════════════════════════════════════════════════════════════ */
    .name-script--caps {
      font-size: clamp(68px, 15vw, 128px);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       &  AMPERSAND ROW
       ═══════════════════════════════════════════════════════════════════════ */
    .ampersand-wrap {
      display: flex;
      align-items: center;
      gap: clamp(14px, 3.5vw, 28px);
      width: clamp(180px, 48vw, 360px);
    }

    .amp-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(179, 139, 77, 0.6), transparent);
    }

    .amp-char {
      font-family: var(--font-script);
      font-size: clamp(36px, 7.5vw, 62px);
      
      color: var(--gold-dark);
      line-height: 1;
      
      text-shadow: 0 0 12px var(--halo-light), 0 0 25px rgba(255,255,255,0.7);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       📜  LAST LINE — "invite you to celebrate their wedding"
       ═══════════════════════════════════════════════════════════════════════ */
    .invite-line {
      font-family: var(--font-sc);
      font-weight: 400;
      font-size: clamp(13px, 2.4vw, 20px);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      
      color: var(--text-accent);
      text-shadow: 0 0 12px var(--halo-light), 0 0 20px rgba(255,255,255,0.5);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       ✦  BOTTOM ORNAMENT — "✦ ✦ ✦"
       ═══════════════════════════════════════════════════════════════════════ */
    .bottom-ornament {
      font-size: clamp(10px, 1.6vw, 14px);
      color: var(--gold-dark);
      letter-spacing: 0.8em;
      opacity: 0.9;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.9));
    }

    /* ═══════════════════════════════════════════════════════════════════════
       📱  MOBILE OVERRIDES
       ═══════════════════════════════════════════════════════════════════════ */
    @media (max-width: 480px) {
      .invitation-wrap { gap: 8px; padding: 16px 12px; }
      .name-script        { font-size: 72px; }
      .name-script--caps  { font-size: 60px; }
    }

    @media (max-height: 520px) and (orientation: landscape) {
      .invitation-wrap { gap: 4px; padding: 10px 20px; }
      .name-script        { font-size: clamp(42px, 9vw, 72px); }
      .name-script--caps  { font-size: clamp(36px, 8vw, 64px); }
      .together, .invite-line { font-size: 12px; }
    }

    @media (min-width: 768px) {
      .invitation-wrap { gap: clamp(14px, 2.8vh, 28px); }
    }

    ::selection { background: rgba(179,139,77,0.25); color: var(--text-main); }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════ -->
  <!--  SCREEN 1 · PRELOADER                  -->
  <!-- ═══════════════════════════════════════ -->
  <div id="loader" class="scene active">
    <div class="loader-bg"></div>
    <div class="loader-particles" id="loaderParticles"></div>

    <div class="loader-content">
      <div class="logo-wrap">
        <div class="logo-glow"></div>
        <!-- Update this source path if needed -->
        <img src="image1.png" alt="Monogram" class="logo-img" />
      </div>
      <p class="loader-subtitle">Loading your invitation&hellip;</p>
      <div class="loader-bar-wrap">
        <div class="loader-bar" id="loaderBar"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════ -->
  <!--  TAP-TO-ENTER overlay (autoplay block) -->
  <!-- ═══════════════════════════════════════ -->
  <div id="tapOverlay" class="tap-overlay hidden">
    <div class="tap-inner">
      <!-- Update this source path if needed -->
      <img src="image1.png" alt="Monogram" class="tap-logo" />
      <p class="tap-label">Tap to Enter</p>
      <div class="tap-ring"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════ -->
  <!--  SCREEN 2 · INTRO / BRIDGE SCENE       -->
  <!-- ═══════════════════════════════════════ -->
  <div id="intro" class="scene hidden">
    <div class="intro-overlay"></div>
    <!-- Update this source path if needed -->
    <img src="image2.gif" alt="Just Married" class="intro-img" />
    <div class="intro-vignette"></div>
  </div>

  <!-- ═══════════════════════════════════════ -->
  <!--  SCREEN 3 · MAIN INVITATION            -->
  <!-- ═══════════════════════════════════════ -->
  <div id="main" class="scene hidden">
    <!-- GIF fullscreen background -->
    <div class="main-bg-wrap">
      <!-- Update this source path if needed -->
      <img src="image3.gif" alt="Pastel Background" class="main-bg-gif" />
    </div>

    <div class="main-overlay-gradient"></div>
    <div class="main-overlay-vignette"></div>

    <!-- Floating particles canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- ── Invitation Text ── -->
    <div class="invitation-wrap">

      <!-- Decorative top rule -->
      <div class="deco-rule anim-item" data-delay="0">
        <span class="rule-line"></span>
        <span class="rule-diamond">✦</span>
        <span class="rule-line"></span>
      </div>

      <!-- Line 1 -->
      <p class="together anim-item" data-delay="1">
        Together with their families
      </p>

      <!-- Name: Tahany -->
      <h1 class="name-script anim-item" data-delay="2">Tahany</h1>

      <!-- Ampersand -->
      <div class="ampersand-wrap anim-item" data-delay="3">
        <span class="amp-line"></span>
        <span class="amp-char">&amp;</span>
        <span class="amp-line"></span>
      </div>

      <!-- Name: Ahmed -->
      <h1 class="name-script name-script--caps anim-item" data-delay="4">
        Ahmed
      </h1>

      <!-- Decorative mid rule -->
      <div class="deco-rule deco-rule--sm anim-item" data-delay="5">
        <span class="rule-line"></span>
        <span class="rule-diamond">✦</span>
        <span class="rule-line"></span>
      </div>

      <!-- Final line -->
      <p class="invite-line anim-item" data-delay="6">
        invite you to celebrate their wedding
      </p>

      <!-- Bottom ornament -->
      <div class="bottom-ornament anim-item" data-delay="7">✦ ✦ ✦</div>

    </div>
  </div>

  <!-- Music (add your audio file as music1.mp3) -->
  <audio id="bgMusic" src="music1.mp3" loop preload="auto"></audio>

  <!-- ═══════════════════════════════════════════════════════════════════════
       JAVASCRIPT LOGIC
       ═══════════════════════════════════════════════════════════════════════ -->
  <script>
    'use strict';

    const CONFIG = {
      INTRO_DURATION:   4500,
      ANIM_BASE_DELAY:  300,
      ANIM_STEP:        380,
      PARTICLE_COUNT:   52,
      PARTICLE_SPEED:   0.35,
      MUSIC_VOLUME:     0.55,
      LOADER_MIN_TIME:  2200,
    };

    const $ = id => document.getElementById(id);
    const loaderEl     = $('loader');
    const tapOverlay   = $('tapOverlay');
    const introEl      = $('intro');
    const mainEl       = $('main');
    const loaderBar    = $('loaderBar');
    const loaderParts  = $('loaderParticles');
    const bgMusic      = $('bgMusic');
    const canvas       = $('particleCanvas');
    const ctx          = canvas ? canvas.getContext('2d') : null;

    let musicStarted = false;
    let animFrameId  = null;

    function showScene(el) {
      el.classList.remove('hidden', 'gone');
      void el.offsetHeight;
      el.classList.add('active');
    }

    function hideScene(el, andRemove = false) {
      el.classList.remove('active');
      el.classList.add('hidden');
      if (andRemove) {
        el.addEventListener('transitionend', () => el.classList.add('gone'), { once: true });
      }
    }

    function spawnLoaderParticles() {
      for (let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 2 + Math.random() * 4;
        p.style.cssText = `
          width:  ${size}px;
          height: ${size}px;
          left:   ${10 + Math.random() * 80}%;
          top:    ${20 + Math.random() * 70}%;
          --dur:   ${4 + Math.random() * 6}s;
          --delay: ${Math.random() * 5}s;
        `;
        loaderParts.appendChild(p);
      }
    }

    function preloadAsset(src, type = 'img') {
      return new Promise(resolve => {
        if (type === 'audio') {
          const audio = document.createElement('audio');
          audio.oncanplaythrough = resolve;
          audio.onerror = resolve;
          audio.src = src;
          setTimeout(resolve, 3000);
          return;
        }
        const img = new Image();
        img.onload  = resolve;
        img.onerror = resolve;
        img.src = src;
      });
    }

    function setProgress(pct) {
      loaderBar.style.width = `${Math.min(pct, 100)}%`;
    }

    async function preloadAll() {
      const assets = [
        { src: 'image1.png',  type: 'img'   },
        { src: 'image2.gif',  type: 'img'   },
        { src: 'image3.gif',  type: 'img'   },
        { src: 'music1.mp3',  type: 'audio' },
      ];

      const startTime = Date.now();
      let loaded = 0;

      const promises = assets.map(a =>
        preloadAsset(a.src, a.type).then(() => {
          loaded++;
          setProgress((loaded / assets.length) * 85);
        })
      );

      await Promise.all(promises);

      const elapsed = Date.now() - startTime;
      const remaining = Math.max(0, CONFIG.LOADER_MIN_TIME - elapsed);
      await new Promise(r => setTimeout(r, remaining));

      setProgress(100);
      await new Promise(r => setTimeout(r, 500));
    }

    function startMusic() {
      if (musicStarted) return;
      bgMusic.volume = CONFIG.MUSIC_VOLUME;
      bgMusic.play()
        .then(() => { musicStarted = true; })
        .catch(() => { showTapOverlay(); });
    }

    function showTapOverlay() {
      tapOverlay.classList.remove('hidden');
      tapOverlay.addEventListener('click', () => {
        tapOverlay.style.opacity = '0';
        bgMusic.play().then(() => {
          musicStarted = true;
          setTimeout(() => tapOverlay.classList.add('hidden'), 800);
        });
      }, { once: true });
    }

    function revealText() {
      const items = mainEl.querySelectorAll('.anim-item');
      items.forEach((el, i) => {
        const delay = CONFIG.ANIM_BASE_DELAY + i * CONFIG.ANIM_STEP;
        setTimeout(() => el.classList.add('revealed'), delay);
      });
    }

    /* Adjusted particles to pop on pastel background (pure white & soft gold) */
    class Particle {
      constructor(w, h) { this.reset(w, h, true); }

      reset(w, h, initial = false) {
        this.x     = Math.random() * w;
        this.y     = initial ? Math.random() * h : h + 10;
        this.size  = 1 + Math.random() * 2.5;
        this.speed = (0.15 + Math.random() * 0.5) * CONFIG.PARTICLE_SPEED;
        this.drift = (Math.random() - 0.5) * 0.3;
        this.life  = 0;
        this.maxLife = 180 + Math.random() * 220;
        this.glow  = Math.random() > 0.6;
      }

      update() {
        this.y   -= this.speed;
        this.x   += this.drift;
        this.life++;
      }

      alpha() {
        const t = this.life / this.maxLife;
        if (t < 0.15) return t / 0.15;
        if (t > 0.75) return 1 - (t - 0.75) / 0.25;
        return 1;
      }

      draw(ctx) {
        const a = this.alpha() * 0.85; /* Increased opacity for pastel visibility */
        if (this.glow) {
          const grad = ctx.createRadialGradient(
            this.x, this.y, 0,
            this.x, this.y, this.size * 4
          );
          grad.addColorStop(0, `rgba(255, 255, 255, ${a})`); /* White glow */
          grad.addColorStop(1, `rgba(255, 255, 255, 0)`);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = `rgba(212, 175, 55, ${a})`; /* Solid gold core */
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    let particles = [];

    function initParticles() {
      if (!canvas || !ctx) return;
      resizeCanvas();
      particles = Array.from({ length: CONFIG.PARTICLE_COUNT },
        () => new Particle(canvas.width, canvas.height)
      );
      animateParticles();
    }

    function resizeCanvas() {
      if (!canvas) return;
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function animateParticles() {
      if (!canvas || !ctx) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach(p => {
        p.update();
        p.draw(ctx);
        if (p.life >= p.maxLife) p.reset(canvas.width, canvas.height);
      });

      animFrameId = requestAnimationFrame(animateParticles);
    }

    async function run() {
      spawnLoaderParticles();
      await preloadAll();
      hideScene(loaderEl, true);
      await new Promise(r => setTimeout(r, 200));
      startMusic();
      showScene(introEl);
      await new Promise(r => setTimeout(r, CONFIG.INTRO_DURATION));
      hideScene(introEl, true);
      await new Promise(r => setTimeout(r, 800)); 
      showScene(mainEl);
      initParticles();
      setTimeout(revealText, 600);
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
      if (particles.length) {
        particles.forEach(p => {
          if (p.x > canvas.width)  p.x = Math.random() * canvas.width;
          if (p.y > canvas.height) p.y = Math.random() * canvas.height;
        });
      }
    });

    document.addEventListener('DOMContentLoaded', run);
  </script>
</body>
</html>
